<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #070a14;
  --card-bg: rgba(255,255,255,0.03);
  --tile-grad-1: #7c3aed;
  --tile-grad-2: #2563eb;
  --tile-grad-3: #0d9488;
  --marked-grad-1: #06b6d4;

html { font-size: 16px; }

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Animated Background Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(124,58,237,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 20%, rgba(37,99,235,0.14) 0%, transparent 55%),

  z-index: -2;
  pointer-events: none;
}
@keyframes bgShift {
  0%   { opacity: 1; transform: scale(1) translate(0, 0); }
  50%  { opacity: 0.85; transform: scale(1.08) translate(2%, -1%); }
  100% { opacity: 1; transform: scale(1) translate(-1%, 1%); }
}

/* Floating particles layer */
#particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Header Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
header {
  text-align: center;

}
header h1 {
  font-size: 3.8rem;

  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 30px rgba(192,132,252,0.5)) drop-shadow(0 0 60px rgba(56,189,248,0.25));

}
@keyframes headerGradient {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Tile Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
.tile {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-weight: 700;
  font-size: clamp(0.58rem, 2.4vw, 0.82rem);
  line-height: 1.15;
  padding: 4px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  background: linear-gradient(145deg, var(--tile-grad-1), var(--tile-grad-2), var(--tile-grad-3));
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 4px 16px rgba(0,0,0,0.35),
    0 0 1px rgba(255,255,255,0.15),
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.2);
  transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s, border-color 0.3s;
  overflow: hidden;
  opacity: 0;
  transform: translateY(40px) scale(0.8) rotateX(15deg);
  animation: tileIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

/* Glass shine Ă”Ă‡Ă¶ diagonal sweep */
.tile::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.25) 0%,
    rgba(255,255,255,0.08) 30%,
    transparent 50%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 1;
}

/* Secondary shine Ă”Ă‡Ă¶ bottom reflection */
.tile::after {
  content: '';
  position: absolute;
  bottom: 0; left: 10%; right: 10%;
  height: 40%;
  border-radius: 0 0 var(--radius) var(--radius);
  background: linear-gradient(to top, rgba(255,255,255,0.04), transparent);
  pointer-events: none;
  z-index: 1;
}

.tile:hover {
  transform: scale(1.1) translateY(-3px);
  box-shadow:
    0 10px 35px var(--glow),
    0 0 20px rgba(124,58,237,0.3),
    inset 0 1px 0 rgba(255,255,255,0.25);
  border-color: rgba(255,255,255,0.2);
  z-index: 2;
}
.tile:active {
  transform: scale(0.92);
  transition-duration: 0.08s;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Marked Tile Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
.tile.marked {
  background: linear-gradient(145deg, #3a3a3a, #4a4a4a, #3d3d3d);
  border-color: rgba(255,255,255,0.08);
  box-shadow:

  text-shadow: none;
}
.tile.spin-in {
  animation: spinIn 0.6s ease-in-out;
}
.tile.spin-out {
  animation: spinOut 0.6s ease-in-out;
}
.tile.marked::after {
  content: 'Ă”ÂŁĂ´';
  position: absolute;
  top: 4px;
  right: 6px;
  font-size: 0.7rem;
  opacity: 0.65;
  background: none;
  height: auto;
  bottom: auto;
  left: auto;

.tile.marked:hover {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Win Line Highlight Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */

@keyframes tileIn {

@keyframes markPop {

  40%  { transform: scale(1.12); }

@keyframes spinIn {

  0%   { transform: perspective(600px) rotateY(0deg); }

@keyframes winGlow {

.win-banner button::before {

.win-banner button:hover {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Toast Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
.toast {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Confetti Canvas Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
#confetti {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Footer Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
footer {

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Responsive Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
@media (max-width: 420px) {

<canvas id="particles"></canvas>

<header>
  <h1>BINGO</h1>
  <div class="subtitle">Tech Bingo Â­Ć’Ă„Â» Ă”Ă‡Ă¶ No-Code â”¬Ă€ Low-Code â”¬Ă€ Pro-Code</div>
</header>

<div class="controls">
  <button onclick="newCard()">Â­Ć’Ă¶Ă¤ New Card</button>
  <button onclick="shareCard()">Â­Ć’Ă´ĂŻ Share Card</button>
  <button class="mute-btn" id="muteBtn" onclick="toggleMute()">Â­Ć’Ă¶Ă¨</button>
</div>

<div class="stats" id="stats">0/25 marked | Lines: 0</div>

  <div class="board" id="board"></div>
</div>

<div class="win-banner" id="winBanner">
  <div class="inner">
    <h2 id="winTitle">BINGO!</h2>
    <p id="winMsg">You completed a line!</p>
    <button onclick="dismissBanner()">Keep Playing</button>
  </div>
</div>

<footer>Tech Bingo Â­Ć’Ă„Â» Ă”Ă‡Ă¶ Built for GitHub Copilot Day</footer>

<script>
/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Words Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
const WORDS = [
  'AZURE','COPILOT','LLM','AUTOMATE','AGENTIC','POWER APPS','LOGIC APPS',
  'GPT','API','DEVOPS','LOW-CODE','NO-CODE','PRO-CODE','GITHUB','AI AGENT',
  'PROMPT','WORKFLOW','SAAS','CHATBOT','RAG','SEMANTIC','VECTOR DB',
  'TERRAFORM','BICEP','COSMOS DB'
];

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Seed-based PRNG (mulberry32) Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hashSeed(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  }
  return h;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ State Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
let seed, rng, tiles, marked, winLines, lineCount, bannerShown, muted = false;

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Audio (Web Audio API) Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playBlip() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(660, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.13, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    o.start(); o.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

function playFanfare() {
  if (muted) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      const t = ctx.currentTime + i * 0.12;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.35);
    });
  } catch(e) {}
}

function toggleMute() {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? 'Â­Ć’Ă¶Ă§' : 'Â­Ć’Ă¶Ă¨';
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Shuffle with seeded RNG Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function shuffle(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Init Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function init() {
  const params = new URLSearchParams(window.location.search);
  seed = params.get('seed');
  if (!seed) {
    seed = Math.random().toString(36).substring(2, 8);
    const url = new URL(window.location);
    url.searchParams.set('seed', seed);
    history.replaceState(null, '', url);
  }
  rng = mulberry32(hashSeed(seed));
  tiles = shuffle(WORDS, rng);
  marked = new Array(25).fill(false);
  winLines = [];
  lineCount = 0;
  bannerShown = { line: false, full: false };
  render();
  updateStats();
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Render Board Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  tiles.forEach((word, i) => {
    const el = document.createElement('div');
    el.className = 'tile';
    if (marked[i]) el.classList.add('marked');
    el.textContent = word;
    el.style.animationDelay = `${(Math.floor(i / 5) * 0.04) + (i % 5) * 0.04}s`;
    el.addEventListener('click', () => toggleTile(i));
    board.appendChild(el);
  });
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Toggle Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function toggleTile(i) {
  marked[i] = !marked[i];
  const el = document.getElementById('board').children[i];
  const spinClass = marked[i] ? 'spin-in' : 'spin-out';
  el.classList.remove('spin-in', 'spin-out');
  // Force reflow so animation restarts
  void el.offsetWidth;
  el.classList.toggle('marked', marked[i]);
  el.classList.add(spinClass);
  el.addEventListener('animationend', () => {
    el.classList.remove(spinClass);
  }, { once: true });
  playBlip();
  checkWins();
  updateStats();
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Win Check Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function getLines() {
  const lines = [];
  for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r * 5 + c));
  for (let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r * 5 + c));
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);
  return lines;
}

function checkWins() {
  const allLines = getLines();
  const board = document.getElementById('board');

  // clear previous win highlights
  for (const el of board.children) el.classList.remove('win-line');

  let newWinLines = [];
  allLines.forEach(line => {
    if (line.every(i => marked[i])) {
      newWinLines.push(line);
      line.forEach(i => board.children[i].classList.add('win-line'));
    }
  });

  const newCount = newWinLines.length;
  const fullHouse = marked.every(Boolean);

  if (fullHouse && !bannerShown.full) {
    bannerShown.full = true;
    showBanner('Â­Ć’Ă„Ă« FULL HOUSE! Â­Ć’Ă„Ă«', 'All 25 tiles marked Ă”Ă‡Ă¶ you absolute legend!');
    playFanfare();
    launchConfetti(200);
  } else if (newCount > lineCount && !fullHouse) {
    if (!bannerShown.line || newCount > lineCount) {
      showBanner('BINGO! Â­Ć’Ă„Â»', `You completed ${newCount} line${newCount > 1 ? 's' : ''}!`);
      playFanfare();
      launchConfetti(80);
    }
  }

  lineCount = newCount;
  winLines = newWinLines;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Stats Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function updateStats() {
  const count = marked.filter(Boolean).length;
  const lines = getLines().filter(l => l.every(i => marked[i])).length;
  document.getElementById('stats').textContent = `${count}/25 marked | Lines: ${lines}`;
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Banner Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function showBanner(title, msg) {
  document.getElementById('winTitle').textContent = title;
  document.getElementById('winMsg').textContent = msg;
  document.getElementById('winBanner').classList.add('show');
}
function dismissBanner() {
  document.getElementById('winBanner').classList.remove('show');
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ New Card Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Toast Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Confetti Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
function launchConfetti(count) {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#fbbf24','#f59e0b','#7c3aed','#2563eb','#0d9488','#f43f5e','#c084fc','#38bdf8','#34d399'];
  const particles = [];
  const shapes = ['rect','circle','ribbon'];

  for (let i = 0; i < count; i++) {
    particles.push({
      x: canvas.width * 0.5 + (Math.random() - 0.5) * canvas.width * 0.6,
      y: -20 - Math.random() * canvas.height * 0.4,
      w: 5 + Math.random() * 7,
      h: 3 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      shape: shapes[Math.floor(Math.random() * shapes.length)],
      vx: (Math.random() - 0.5) * 6,
      vy: 2 + Math.random() * 5,
      rot: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.2,
      life: 1
    });
  }

  let raf;
  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.life <= 0) return;
      alive = true;
      p.x += p.vx;
      p.vy += 0.07;
      p.y += p.vy;
      p.rot += p.rv;
      if (p.y > canvas.height + 20) { p.life = 0; return; }
      p.life -= 0.003;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, p.w / 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'ribbon') {
        ctx.fillRect(-p.w / 2, -1, p.w, 2.5);
      } else {
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      }
      ctx.restore();
    });
    if (alive) raf = requestAnimationFrame(frame);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if (raf) cancelAnimationFrame(raf);
  frame();
}

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Popstate (back/forward) Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
window.addEventListener('popstate', init);

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Floating Particles Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
(function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, pts = [];
  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  const count = 40;
  for (let i = 0; i < count; i++) {
    pts.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: 1 + Math.random() * 2,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      a: 0.08 + Math.random() * 0.15
    });
  }
  function draw() {
    ctx.clearRect(0, 0, w, h);
    pts.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(192,132,252,${p.a})`;
      ctx.fill();
    });
    // Draw faint connecting lines for nearby particles
    for (let i = 0; i < pts.length; i++) {
      for (let j = i + 1; j < pts.length; j++) {
        const dx = pts[i].x - pts[j].x;
        const dy = pts[i].y - pts[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          ctx.beginPath();
          ctx.moveTo(pts[i].x, pts[i].y);
          ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = `rgba(124,58,237,${0.06 * (1 - dist / 150)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* Ă”Ă¶Ă‡Ă”Ă¶Ă‡ Boot Ă”Ă¶Ă‡Ă”Ă¶Ă‡ */
init();
